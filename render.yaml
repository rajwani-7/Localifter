services:
  - type: web
    name: localifter-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: localifter-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: localifter-db
    plan: free
